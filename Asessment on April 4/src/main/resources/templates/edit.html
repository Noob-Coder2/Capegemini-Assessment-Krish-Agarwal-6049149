<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Employee</title>
</head>
<body>

    <div class="form-container">
        <form th:action="@{/edit/{id}(id=${employee.id})}" th:object="${employee}" method="post">
            
            <div class="id-display">
                <span>ID</span>
                <span th:text="*{id}"></span>
                <input type="hidden" th:field="*{id}" />
            </div>

            <div class="form-group">
                <label>Name</label>
                <input type="text" th:field="*{name}" />
            </div>
            <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error"></div>

            <div class="form-group">
                <label>Salary</label>
                <input type="number" step="0.01" th:field="*{sal}" />
            </div>
            <div th:if="${#fields.hasErrors('sal')}" th:errors="*{sal}" class="error"></div>

            <div class="form-group">
                <label>DOJ</label>
                <input type="date" th:field="*{doj}" />
            </div>
            <div th:if="${#fields.hasErrors('doj')}" th:errors="*{doj}" class="error"></div>

            <div class="form-group">
                <label>Dept</label>
                <input type="text" th:field="*{dept}" />
            </div>
            <div th:if="${#fields.hasErrors('dept')}" th:errors="*{dept}" class="error"></div>

            <button type="submit" class="btn-save">Save</button>
        </form>
    </div>

</body>
</html>
