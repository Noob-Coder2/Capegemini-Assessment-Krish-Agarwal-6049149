<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employees Template</title>
</head>
<body>

    <!-- Display Success Messages -->
    <div th:if="${successMessage}" class="success-msg">
        <span th:text="${successMessage}"></span>
    </div>

    <table border="2">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Salary</th>
                <th>DOJ</th>
                <th>Dept</th>
                <th></th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="emp : ${employees}">
                <td th:text="${emp.id}"></td>
                <td th:text="${emp.name}"></td>
                <td th:text="${emp.sal}"></td>
                <td th:text="${emp.doj}"></td>
                <td th:text="${emp.dept}"></td>
                <td><a th:href="@{/edit/{id}(id=${emp.id})}">Edit</a></td>
                <td><a th:href="@{/delete/{id}(id=${emp.id})}" 
                       onclick="return confirm('Are you sure you want to delete this employee?');">Delete</a></td>
            </tr>
        </tbody>
    </table>

</body>
</html>
